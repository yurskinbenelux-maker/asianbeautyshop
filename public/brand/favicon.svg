<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon — yu·r wordmark only, tightly cropped to read at 16×16.
  The four paths are extracted directly from logo-lockup.svg (original
  Illustrator coordinates preserved) but the viewBox crops away every-
  thing outside the letterforms so the whole 16×16 tab-icon slot is
  occupied by ink.

  Matches the wordmark crop used by <Logo variant="wordmark" />, just
  as a standalone file so browsers don't have to follow a nested SVG
  <image> reference (which some favicon renderers skip).

  If Sofia ever redraws the logo, re-export the new paths from the
  updated .ai / .svg into this file — keep the viewBox numbers in sync
  with the Logo component (see src/components/brand/logo.tsx → VIEWBOX).
-->
